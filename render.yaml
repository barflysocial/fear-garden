services:
  - type: web
    name: barfly-choice-engine
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: barfly-choice-engine-db
          property: connectionString

databases:
  - name: barfly-choice-engine-db
    plan: free
